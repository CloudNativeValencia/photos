  <style>
    :root {
      --bg: #0f0f10;
      --surface: #17181b;
      --surface-2: #1d2025;
      --text: #f5f5f5;
      --muted: #b9bcc3;
      --border: #2c2f36;
      --accent: #7dd3fc;
      --max: 1400px;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: var(--bg);
      color: var(--text);
      line-height: 1.5;
    }

    .wrap {
      max-width: var(--max);
      margin: 0 auto;
      padding: 20px 12px 32px;
    }

    .topbar {
      display: flex;
      flex-wrap: wrap;
      align-items: baseline;
      justify-content: space-between;
      gap: 12px;
      margin-bottom: 18px;
    }

    .back-link {
      color: var(--accent);
      text-decoration: none;
      font-size: 0.95rem;
    }

    .back-link:hover,
    .back-link:focus-visible {
      text-decoration: underline;
      outline: none;
    }

    h1 {
      margin: 0;
      font-size: 1.75rem;
    }

    .subtitle {
      margin: 4px 0 0;
      color: var(--muted);
      font-size: 0.98rem;
    }

    .gallery {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
      gap: 6px;
    }

    .photo {
      display: block;
      background: var(--surface);
      border: 1px solid var(--border);
      overflow: hidden;
    }

    .photo img {
      display: block;
      width: 100%;
      height: auto;
      background: var(--surface-2);
      transition: transform 160ms ease, opacity 160ms ease;
    }

    .photo:hover img,
    .photo:focus-visible img {
      transform: scale(1.02);
      opacity: 0.96;
    }

    .photo:focus-visible {
      outline: 2px solid var(--accent);
      outline-offset: 2px;
    }

    @media (max-width: 640px) {
      .gallery {
        grid-template-columns: repeat(2, 1fr);
      }
    }
  </style>
</head>
